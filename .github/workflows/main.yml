name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # We add 'defaults' here to tell the action to always work inside your sub-folder
    defaults:
      run:
        working-directory: billing-calculator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # We point to the path inside your folder
          path: billing-calculator/app/build/outputs/apk/debug/app-debug.apk
